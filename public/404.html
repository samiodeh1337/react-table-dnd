<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>react-table-dnd</title>
    <script>
      // GitHub Pages SPA redirect — preserves the path/hash for client-side routing
      var path = window.location.pathname + window.location.search + window.location.hash
      window.location.replace(
        '/react-table-dnd/' +
          (path !== '/react-table-dnd/' ? '?p=' + encodeURIComponent(path) : ''),
      )
    </script>
  </head>
  <body></body>
</html>
